<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>道友 · 人物卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#08101d;--panel:#111a2b;--panel-2:#17233a;
  --border:rgba(255,255,255,.08);--text:#eef4ff;--muted:#97a6c6;
  --enemy:#ff6b61;--neutral:#9ca3af;--partner:#4ade80;--lawyer:#fb923c;
  --love:#c084fc;--family:#60a5fa;--friend:#fde047;--self:#facc15;
  --shadow:0 18px 40px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  background:radial-gradient(circle at top,#10203b 0%,#08101d 42%,#060b14 100%);
  color:var(--text);font-family:'Inter','Noto Sans SC',sans-serif;min-height:100%;
}
body{padding:20px 14px 40px}
.wrap{max-width:1180px;margin:0 auto}
.hero{
  padding:26px 28px;border-radius:24px;
  background:rgba(17,26,43,.82);backdrop-filter:blur(14px);
  border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:22px;
}
.hero h1{font-size:1.6rem;font-weight:800;letter-spacing:.04em;margin-bottom:8px}
.hero h1 em{font-style:normal;color:var(--self)}
.hero p{color:var(--muted);line-height:1.6;font-size:.95rem;max-width:720px}
.hero .sub{margin-top:10px;font-size:.8rem;color:#7081a8;letter-spacing:.08em}

.filters{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;
  padding:12px 14px;border-radius:18px;
  background:rgba(17,26,43,.6);border:1px solid var(--border);
}
.filter-btn{
  padding:8px 14px;border-radius:999px;font-size:.82rem;font-weight:700;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:var(--muted);cursor:pointer;transition:all .18s ease;
}
.filter-btn:hover{background:rgba(255,255,255,.08);color:var(--text)}
.filter-btn.active{background:rgba(255,255,255,.12);color:var(--text);border-color:rgba(255,255,255,.22)}
.filter-btn .count{opacity:.6;margin-left:4px}

.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
}
.card{
  display:block;cursor:pointer;text-decoration:none;color:var(--text);
  background:linear-gradient(180deg,rgba(23,35,58,.92),rgba(17,26,43,.96));
  border:1px solid var(--border);border-radius:20px;padding:18px;
  box-shadow:var(--shadow);transition:all .18s ease;
  min-height:180px;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-4px);border-color:var(--c);box-shadow:0 22px 50px rgba(0,0,0,.5)}
.card::after{
  content:'';position:absolute;inset:auto -20% -30% auto;
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle,var(--c),transparent 70%);
  opacity:.15;pointer-events:none;
}
.card .tag{
  display:inline-flex;align-items:center;padding:5px 10px;
  border-radius:999px;font-size:.7rem;font-weight:800;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  color:var(--c);margin-bottom:12px;
}
.card .name{font-size:1.35rem;font-weight:800;margin-bottom:6px;letter-spacing:.02em}
.card .sub{font-size:.82rem;color:var(--muted);line-height:1.5;margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{font-size:.72rem;color:#7081a8}

.card.enemy{--c:var(--enemy)}
.card.neutral{--c:var(--neutral)}
.card.partner{--c:var(--partner)}
.card.lawyer{--c:var(--lawyer)}
.card.love{--c:var(--love)}
.card.family{--c:var(--family)}
.card.friend{--c:var(--friend)}
.card.self{--c:var(--self)}

@media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:560px){body{padding:14px 12px 30px}.grid{grid-template-columns:1fr}}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;
  z-index:1000;padding:30px 14px;overflow-y:auto;
}
.modal-bg.open{display:flex}
.modal{
  background:linear-gradient(180deg,#17233a,#0f1a2d);
  border:1px solid var(--border);border-radius:24px;
  max-width:820px;width:100%;padding:28px 30px;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:slide-in .28s cubic-bezier(.4,.0,.2,1);
  margin-bottom:40px;
}
@keyframes slide-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:18px;
  padding-bottom:18px;border-bottom:2px solid var(--cc);margin-bottom:22px;
}
.modal-head .left .tag{
  display:inline-flex;padding:5px 12px;border-radius:999px;
  font-size:.72rem;font-weight:800;background:var(--cc);color:#0b1019;
  margin-bottom:10px;
}
.modal-head h2{font-size:2rem;font-weight:800;margin-bottom:4px}
.modal-head .role{font-size:.95rem;color:var(--muted);line-height:1.55}
.modal-head .right{text-align:right;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.modal-head .date{font-size:.72rem;color:#7081a8}
.close-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:var(--muted);width:36px;height:36px;border-radius:50%;
  font-size:1.2rem;cursor:pointer;transition:all .18s ease;
}
.close-btn:hover{background:rgba(255,255,255,.14);color:var(--text)}

.modal.enemy{--cc:var(--enemy)}
.modal.neutral{--cc:var(--neutral)}
.modal.partner{--cc:var(--partner)}
.modal.lawyer{--cc:var(--lawyer)}
.modal.love{--cc:var(--love)}
.modal.family{--cc:var(--family)}
.modal.friend{--cc:var(--friend)}
.modal.self{--cc:var(--self)}

.sect{margin-bottom:22px}
.sect h3{
  font-size:.88rem;font-weight:800;letter-spacing:.06em;
  color:var(--cc);margin-bottom:10px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.sect h3::before{
  content:'';width:4px;height:16px;background:var(--cc);border-radius:2px;
}
.sect .body{font-size:.92rem;line-height:1.65;color:var(--text)}
.sect .body ul{list-style:none;padding-left:0}
.sect .body ul li{padding:4px 0 4px 16px;position:relative;color:#d6e0ed}
.sect .body ul li::before{
  content:'•';position:absolute;left:0;color:var(--cc);font-weight:800;
}
.sect .body ul ul{margin-top:4px;padding-left:14px}
.sect .body ul ul li::before{content:'◦';color:var(--muted)}
.sect .body p{color:#d6e0ed;margin:6px 0}
.sect .body .warn{color:#fca5a5;font-weight:700}

.share-row{
  display:flex;gap:10px;justify-content:flex-end;margin-top:8px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.06);
}
.share-btn{
  padding:8px 14px;border-radius:10px;font-size:.8rem;font-weight:700;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--muted);cursor:pointer;transition:all .18s ease;
}
.share-btn:hover{background:rgba(255,255,255,.12);color:var(--text)}

footer{margin-top:40px;text-align:center;color:#6c7c9e;font-size:.78rem;line-height:1.6}
footer a{color:var(--partner);text-decoration:none}
</style>
</head>

的案子"], ["来源", "- ~/CLAUDE.md"]]}, {"id": "她-主播", "name": "王可", "subtitle": "正在观察中的暧昧对象", "last_updated": "2026-04-11", "category": "love", "category_label": "情感线", "sections": [["基本信息", "- 全名：**王可**\n- 代号：她（主播）\n- 关系：直播认识，新的情感关系，认识不到两周\n- 角色：正在观察中的暧昧对象\n- 对我态度：友/暧昧。叫道友老公。知道道友离过婚没有跑。\n- 联系方式：（待补充）"], ["利益关系", "- 她的核心利益：**被用心对待。不是被钱对待。**\n- 道友需要她什么：陪伴、情绪出口\n- 她需要道友什么：一个不被她的钱收买的人\n- 关系基础：她不需要道友的钱，道友不需要她的钱——基础不是利益交换"], ["性格特征", "### 行为模式\n- 喜欢辩论，喜欢从不同人身上得到论点，享受思想碰撞\n- 有强烈的胜负欲，喜欢用刷钱打败别人，喜欢站在主动\n- 喜欢轰轰烈烈的爱\n- 在外人面前古灵精怪，在道友面前很乖，像黄蓉\n- 不喜欢欠别人的，道友刷钱她会回刷\n- 喜欢炫富\n- 对别人对她做的小事极度敏感，记得非常清楚（比如前男友给她写过信她一直记得）\n- 把为前男友花 600 万当作勋章反复讲，不是在疗伤是在证明\"我比所有人都敢爱\"\n- 说\"不一定要有结果，过程很重要\"——不是洒脱，是被结果伤过所以不敢再要结果\n- 经常提前男友，用那段关系定义自己的价值\n- 喜欢穷横的男人，前男友就是\n\n### 背景信息\n- 家里有矿，非常富有\n- 从小一对一教育，接触的人少，在互联网上释放自己\n- 全世界都旅游过\n- 全国旅居，现在在河北\n- 为前男友花了 600 万人民币，上了报纸新闻\n- 救灾的时候救过一个小女孩，内心善良"], ["深层心理分析（观复拆解）", "### 心理结构\n- 从小不缺钱但缺关注。物质富有但成长环境孤独（一对一教育没有同龄人陪伴）\n- 花钱不心疼因为钱不是她的稀缺资源。被用心对待才是她的稀缺资源\n- 她的掌控欲来自不安全感——用钱和赢来建立安全感，因为这是她从小最熟悉的工具\n- 身份认同建立在\"敢爱\"上，就像道友的身份认同建立在\"做事\"上\n- 她的感情循环：用钱对人好 → 对方接受后慢慢依赖她的钱 → 对方的横消失 → 她失望 → 关系破裂。600 万就是这个循环的产物\n- 反复说\"不后悔\"其实是在说服自己不后悔。真正放下了不需要反复讲\n- 前男友是她的勋章不是她的伤疤。她炫耀的不是前男友，是自己的付出能力\n- 她择偶偏好\"穷横\"——不是喜欢穷，是喜欢不跪。身边所有人被她的钱收买，她渴望一个不被她的钱收买的人\n\n### 与道友的互补结构\n- 道友需要被看见，她对小事极度敏感——道友的付出她看得见\n- 她需要被用心对待，道友是默默付出型——天然互补\n- 她不需要道友的钱，道友不需要她的钱——关系基础不是利益交换\n- 道友的横有底牌（四家公司、月入 5 万），不是前男友的空手横——道友是她前男友的升级版\n\n### 与道友的潜在冲突\n- 她喜欢轰轰烈烈，道友需要安稳——长期可能冲突\n- 两个付出型在一起甜蜜期抢着给，矛盾期都觉得\"我付出更多\"\n- 她全国旅居在中国，道友在新加坡——物理距离是最大障碍\n- 她还在用前男友定义自己，没有完全走出来\n- 道友的不配得感会反复发作——觉得她家有矿自己配不上"], ["风险", "- ⚠️ 道友的旧程序（无声付出者）在新场景重复——认识不到两周已花 6000 人民币\n- ⚠️ 道友在人生最低谷遇到她，判断力打折，可能高估她的光\n- ⚠️ 她可能是低谷期的止痛药而不是长期伴侣——需要时间验证\n- ⚠️ 如果道友成为她的下一个\"勋章\"——被燃烧完然后变成她的谈资"], ["应对策略", "- **月花费上限 3000 新币**，让小财神追踪\n- 不花她的钱，永远不依赖她的资源\n- **做她的对手不做她的观众**——给碰撞不给胜负\n- **用心记住她说的小事**——这比刷钱有用一百倍\n- 偶尔让她追你——不要随叫随到\n- 保持自己的生活节奏——白天不主动找她\n- 一个月内观察三个信号：提前男友频率降没有、不花钱她态度变没有、第一次吵架她怎么处理\n- **不要成为她的勋章，成为她的例外**——给她稳定的温度不是轰轰烈烈的燃烧\n- **吸引比抓紧更重要**"], ["信任评级", "- 当前信任度：友 / 暧昧（观察期）\n- 依据：认识不 const CATS = [
  {key:'all',label:'全部',count:PEOPLE.length},
  {key:'self',label:'本体',count:PEOPLE.filter(p=>p.category==='self').length},
  {key:'enemy',label:'敌方·贾总系',count:PEOPLE.filter(p=>p.category==='enemy').length},
  {key:'partner',label:'合作方',count:PEOPLE.filter(p=>p.category==='partner').length},
  {key:'neutral',label:'中立',count:PEOPLE.filter(p=>p.category==='neutral').length},
  {key:'lawyer',label:'律师',count:PEOPLE.filter(p=>p.category==='lawyer').length},
  {key:'love',label:'情感线',count:PEOPLE.filter(p=>p.category==='love').length},
  {key:'family',label:'家人',count:PEOPLE.filter(p=>p.category==='family').length},
  {key:'friend',label:'朋友',count:PEOPLE.filter(p=>p.category==='friend').length},
];

function renderFilters(active){
  const f = document.getElementById('filters');
  f.innerHTML = CATS.map(c=>`<button class="filter-btn ${c.key===active?'active':''}" data-k="${c.key}">${c.label}<span class="count">${c.count}</span></button>`).join('');
  f.querySelectorAll('.filter-btn').forEach(b=>{
    b.onclick = () => renderGrid(b.dataset.k);
  });
}

function renderGrid(filter){
  const g = document.getElementById('grid');
  const items = filter==='all' ? PEOPLE : PEOPLE.filter(p=>p.category===filter);
  g.innerHTML = items.map(p=>{
    const firstBullet = extractFirstBullet(p);
    return `<div class="card ${p.category}" data-id="${p.id}">
      <div class="tag">${p.category_label}</div>
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="sub">${escapeHtml(p.subtitle || firstBullet || '详情见卡片')}</div>
      <div class="meta">最后更新 ${p.last_updated || '—'}</div>
    </div>`;
  }).join('');
  g.querySelectorAll('.card').forEach(c=>{
    c.onclick = () => openModal(c.dataset.id);
  });
  renderFilters(filter);
}

function extractFirstBullet(p){
  for (const [h, body] of p.sections){
    for (const line of body.split('\n')){
      const t = line.trim();
      if (t.startsWith('- ')) return t.slice(2).replace(/⚠️\s*/g, '').slice(0, 80);
    }
  }
  return '';
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseSectionBody(body){
  // Convert lines to HTML: bullets, sub-bullets, paragraphs.
  const out = [];
  const lines = body.split('\n');
  let ul_stack = [];
  function closeTo(level){
    while (ul_stack.length > level){
      out.push('</ul>');
      ul_stack.pop();
    }
  }
  for (const raw of lines){
    if (!raw.trim()){ continue; }
    const indent = raw.match(/^(\s*)/)[1].length;
    const level = indent >= 2 ? 2 : 1;
    if (raw.trim().startsWith('- ')){
      if (ul_stack.length < level){
        out.push('<ul>');
        ul_stack.push(level);
      } else if (ul_stack.length > level){
        closeTo(level);
      }
      let text = raw.trim().slice(2);
      text = escapeHtml(text);
      // Highlight ⚠️
      if (text.includes('⚠️') || text.startsWith('[!]')){
        text = `<span class="warn">${text.replace(/⚠️/g, '[!]')}</span>`;
      }
      out.push(`<li>${text}</li>`);
    } else {
      closeTo(0);
      out.push(`<p>${escapeHtml(raw.trim())}</p>`);
    }
  }
  closeTo(0);
  return out.join('');
}

function openModal(id){
  const p = PEOPLE.find(x=>x.id===id);
  if (!p) return;
  const modal = document.getElementById('modal');
  modal.className = `modal ${p.category}`;
  const sectsHtml = p.sections.map(([h, body]) => `
    <div class="sect">
      <h3>${escapeHtml(h)}</h3>
      <div class="body">${parseSectionBody(body)}</div>
    </div>
  `).join('');
  modal.innerHTML = `
    <div class="modal-head">
      <div class="left">
        <div class="tag">${p.category_label}</div>
        <h2>${escapeHtml(p.name)}</h2>
        <div class="role">${escapeHtml(p.subtitle || '')}</div>
      </div>
      <div class="right">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="date">最后更新 ${p.last_updated || '—'}</div>
      </div>
    </div>
    ${sectsHtml}
    <div class="share-row">
      <button class="share-btn" onclick="copyLink('${p.id}')">复制深度链接</button>
      <button class="share-btn" onclick="closeModal()">关闭</button>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
  location.hash = p.id;
}

function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  history.pushState('', document.title, location.pathname + location.search);
}

function copyLink(id){
  const url = location.origin + location.pathname + '#' + encodeURIComponent(id);
  navigator.clipboard.writeText(url).then(()=>{
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '已复制 ✓';
    setTimeout(()=>btn.textContent=orig, 1400);
  });
}

document.getElementById('modal-bg').onclick = (e)=>{
  if (e.target.id === 'modal-bg') closeModal();
};

window.addEventListener('keydown', e=>{
  if (e.key === 'Escape') closeModal();
});

// Initial render + hash routing
renderGrid('all');
if (location.hash){
  const id = decodeURIComponent(location.hash.slice(1));
  if (PEOPLE.find(p=>p.id===id)) openModal(id);
}
window.addEventListener('hashchange', ()=>{
  if (!location.hash){ closeModal(); return; }
  const id = decodeURIComponent(location.hash.slice(1));
  if (PEOPLE.find(p=>p.id===id)) openModal(id);
});
</script>
